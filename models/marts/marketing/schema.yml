version: 2

models:
  - name: fct_ad_performance_daily
    description: "Final reporting table for paid media. Used by Metabase/Streamlit for ROI, CPC, and CTR analysis."
    columns:
      - name: campaign_key
        description: "Primary key for joining to dim_campaigns."
        tests:
          - not_null
      - name: date_day
        description: "Reporting date."
      - name: daily_spend_usd
        description: "Total spend for the day."
      - name: daily_ctr
        description: "Click-Through Rate (Clicks/Impressions)."
      - name: daily_cpc_usd
        description: "Cost-Per-Click in USD."

  - name: fct_web_sessions_daily
    description: "GA4 Traffic and Engagement data grouped by channel."
    columns:
      - name: channel_grouping
        description: "High-level grouping (Direct, Paid Social, Organic Search, etc)."
      - name: engagement_rate
        description: "Engaged Sessions / Total Sessions."

  - name: dim_contacts
    description: "B2B Unified Contacts dimension with Account linkage."

  - name: dim_campaigns
    description: "Unified Campaign dimension across Google, Meta, and LinkedIn."
